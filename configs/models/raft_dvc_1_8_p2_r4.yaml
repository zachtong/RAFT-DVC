# Model Configuration: RAFT-DVC with 1/8 Resolution Encoder, L=2 (paper-2 A2)
#
# Variant of raft_dvc_1_8_p4_r4.yaml with corr_levels forced from 4 -> 2 so the
# correlation lookup is *identical* to 1/1, 1/2, 1/4 encoders in the paper-2 A
# sweep (fm=16, L=2, r=4 -> every encoder samples the same 9^3 * 2 = 1458 corr
# values per fm voxel).  Without this enforcement, the 1/8 encoder would lookup
# from a 4-level pyramid (5832 values) and silently confound architecture effect
# with lookup-capacity effect.
#
# Max search radius: r * 2^(L-1) = 4 * 2 = 8 fm-voxels = 64 input-voxels.
# Paper-2 sweep max disp is ~6 input-voxel, so coverage is ample.
#
# NOTE: this departs from VolRAFT's recommended L=4 for 1/8 encoder.  Justified
# here because:
#   (a) paper-2 input=128 with max disp ~6 voxel never needs >>8 fm-voxel reach
#   (b) controlled-variable experiment design requires identical corr lookup

name: "RAFT-DVC-1/8-P2-R4"
description: >
  Paper-2 A2 variant: 1/8 encoder with corr_levels=2 enforced to match
  the rest of the A sweep.  Use with input size 128 -> feature map 16x16x16.

architecture:
  encoder_type: "1/8"

  input_channels: 1
  feature_dim: 128
  encoder_norm: "instance"
  encoder_dropout: 0.0

  hidden_dim: 96
  context_dim: 64
  context_norm: "none"
  context_dropout: 0.0

  # Correlation pyramid -- matches A1 encoders (1/1, 1/2) and A2 1/4
  corr_levels: 2
  corr_radius: 4

  use_sep_conv: true

  iters: 12

metadata:
  downsample_factor: 8
  feature_map_size: "H/8 x W/8 x D/8"

  # Performance estimates (paper-2 input=128 -> fm=16, batch TBD post A1)
  recommended_batch_size: 8
  memory_usage_estimate: "~60-80 GB on GH200 at batch=8 fp16 (encoder-bound)"
  training_time_relative: 1.0

  # Capabilities (with L=2, r=4)
  max_displacement_estimate: "~64 voxels (input space)"
  spatial_precision: "Standard for voxel-level measurements"

  recommended_for:
    - "Paper-2 A-group size extension at input=128"
    - "Baseline architecture comparable to VolRAFT downsample"
